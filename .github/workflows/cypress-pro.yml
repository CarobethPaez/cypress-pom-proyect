name: 🧪 Cypress E2E Test Suite

on:
  push:
    branches: [main, develop, 'feat/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1-5'        # corre automáticamente a las 8am, lun-vie

env:
  CYPRESS_BASE_URL: https://www.saucedemo.com

jobs:

  # ============================================================
  # JOB 1: Verificación rápida antes de correr los tests
  # ============================================================
  install:
    name: 📦 Install & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npx cypress verify

      # Cachear node_modules para los siguientes jobs
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  # ============================================================
  # JOB 2: Tests E2E en múltiples navegadores (Matrix Strategy)
  # ============================================================
  e2e-tests:
    name: 🌐 E2E Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: install                 # espera que el job "install" termine

    strategy:
      fail-fast: false             # si falla en un browser, continúa con los otros
      matrix:
        browser: [chrome, firefox] # corre los tests en AMBOS navegadores

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests on ${{ matrix.browser }}
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          config: video=true
        env:
          CYPRESS_BASE_URL: ${{ env.CYPRESS_BASE_URL }}

      # Guardar videos de los tests
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()               # siempre guarda, aunque pasen los tests
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/reports/videos
          retention-days: 3

      # Guardar screenshots si falla
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/reports/screenshots
          retention-days: 7

  # ============================================================
  # JOB 3: Notificación del resultado (solo en main)
  # ============================================================
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: e2e-tests               # espera que los tests terminen
    if: always()                   # corre aunque los tests fallen

    steps:
      - name: Tests passed
        if: needs.e2e-tests.result == 'success'
        run: echo "✅ All E2E tests passed successfully!"

      - name: Tests failed
        if: needs.e2e-tests.result == 'failure'
        run: |
          echo "❌ E2E tests failed!"
          echo "Check the artifacts for screenshots and videos"
          exit 1