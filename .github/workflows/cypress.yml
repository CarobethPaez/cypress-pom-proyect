name: Cypress E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron:
        '0 11 * * 1-5' # Every weekday at 11:00 UTC
jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Print Cypress version
        run: npx cypress --version

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: 'cypress/e2e/auth/*.cy.ts'
        env:
          CYPRESS_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          CYPRESS_BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/reports/screenshots
          retention-days: 7

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/reports/videos
          retention-days: 3

      # Merge de reportes JSON
      - name: Merge test reports
        if: always()
        run: npx mochawesome-merge "cypress/reports/mochawesome/mochawesome*.json" -o cypress/reports/mochawesome/report.json

      # Generar reporte HTML
      - name: Generate HTML report
        if: always()
        run: npm run report:generate

# Subir reporte como artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: cypress/reports/mochawesome/report.html
          retention-days: 30